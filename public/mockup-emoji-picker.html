<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Avatar Picker — Mockup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f6fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .note {
      color: rgba(0,0,0,0.28);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Page card ── */
    .page {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px 44px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 40px;
    }
    .logo-alaya { color: #0d1b6e; font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }
    .logo-pulse { color: #ff0065; font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }

    /* ── Heading ── */
    .heading {
      text-align: center;
      margin-bottom: 32px;
    }
    .heading h1 {
      color: #0d1b6e;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .heading p {
      color: #7b84b0;
      font-size: 15px;
    }

    /* ── Code boxes ── */
    .code-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .code-box {
      width: 58px;
      height: 68px;
      border: 2px solid #e2e5f0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #0d1b6e;
      background: #fff;
      transition: border-color 0.15s;
    }
    .code-box.active { border-color: #ff0065; }
    .code-box.filled { border-color: #c5c9e0; color: #0d1b6e; }

    /* ── Name field ── */
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #0d1b6e;
      margin-bottom: 8px;
    }
    .field label .optional {
      color: #9ba3c4;
      font-weight: 400;
    }
    .field input {
      width: 100%;
      background: #fff;
      border: 1.5px solid #e2e5f0;
      border-radius: 12px;
      color: #0d1b6e;
      font-size: 15px;
      font-weight: 400;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #ff0065; }
    .field input::placeholder { color: #b0b8d4; }

    /* ── Avatar section ── */
    .avatar-section {
      margin-bottom: 20px;
    }
    .avatar-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .avatar-label {
      font-size: 14px;
      font-weight: 600;
      color: #0d1b6e;
    }
    .avatar-selected-preview {
      font-size: 20px;
      line-height: 1;
      background: #fff0f5;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #ffb3cc;
      transition: all 0.15s;
    }

    /* ── Category tabs ── */
    .tabs {
      display: flex;
      gap: 7px;
      margin-bottom: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 999px;
      border: 1.5px solid #e2e5f0;
      background: #f8f9fc;
      color: #7b84b0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab .tab-emoji { font-size: 13px; line-height: 1; }
    .tab:hover {
      border-color: #c5c9e0;
      color: #0d1b6e;
    }
    .tab.active {
      background: #fff0f5;
      border-color: #ff0065;
      color: #ff0065;
    }

    /* ── Emoji grid ── */
    .emoji-grid-wrap {
      background: #f8f9fc;
      border: 1.5px solid #e2e5f0;
      border-radius: 14px;
      padding: 10px;
      max-height: 188px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #dde0ee transparent;
    }
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .emoji-btn {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      line-height: 1;
      border-radius: 9px;
      cursor: pointer;
      background: transparent;
      border: 2px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }
    .emoji-btn:hover {
      background: rgba(255,0,101,0.07);
      transform: scale(1.15);
    }
    .emoji-btn.selected {
      background: #fff0f5;
      border-color: #ff0065;
      transform: scale(1.1);
    }

    /* ── Join button ── */
    .join-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: #ff0065;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .join-btn:hover { opacity: 0.88; transform: scale(0.99); }
    .join-btn .join-avatar { font-size: 18px; line-height: 1; }

    .footer-note {
      text-align: center;
      font-size: 13px;
      color: #9ba3c4;
    }
    .skip-note {
      text-align: center;
      font-size: 11px;
      color: #b0b8d4;
      margin-top: -8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <p class="note">Mockup — join session page preview</p>

  <div class="page">
    <div class="logo">
      <span class="logo-alaya">alaya</span>
      <span class="logo-pulse">pulse</span>
    </div>

    <div class="heading">
      <h1>Join a session</h1>
      <p>Enter the code shown on the screen</p>
    </div>

    <div class="code-row">
      <div class="code-box active"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
      <div class="code-box"></div>
    </div>

    <div class="field">
      <label>Your name <span class="optional">(optional)</span></label>
      <input type="text" value="" placeholder="e.g. Sarah" />
    </div>

    <div class="avatar-section">
      <div class="avatar-label-row">
        <span class="avatar-label">Pick your avatar <span style="color:#b0b8d4; font-weight:400; font-size:13px;">(optional)</span></span>
        <div class="avatar-selected-preview" id="preview">🦁</div>
      </div>

      <div class="tabs" id="tabs">
        <div class="tab" data-cat="faces">
          <span class="tab-emoji">😎</span> Faces
        </div>
        <div class="tab active" data-cat="animals">
          <span class="tab-emoji">🦁</span> Animals
        </div>
        <div class="tab" data-cat="characters">
          <span class="tab-emoji">🧙</span> Characters
        </div>
        <div class="tab" data-cat="nature">
          <span class="tab-emoji">🔥</span> Nature
        </div>
        <div class="tab" data-cat="power">
          <span class="tab-emoji">👑</span> Objects
        </div>
      </div>

      <div class="emoji-grid-wrap">
        <div class="emoji-grid" id="grid"></div>
      </div>
    </div>

    <p class="skip-note">No preference? We'll pick one for you.</p>

    <button class="join-btn" id="joinBtn">
      <span class="join-avatar" id="btnAvatar">🦁</span>
      Join session
    </button>

    <p class="footer-note">No account needed · Your responses can be anonymous</p>
  </div>

  <script>
    const CATEGORIES = {
      faces:      ['😎','🤩','🥳','😏','🤓','🤠','🫡','😤','🥸','😇','🤑','🤯','🥶','🤫','🫠'],
      animals:    ['🦁','🐯','🦊','🦝','🦅','🐬','🦈','🐉','🦋','🐺','🦄','🦓','🐸','🐧','🦉','🦩','🐙','🦑','🐊','🦀','🐆','🦏'],
      characters: ['🧙','🦸','🥷','🤴','👸','🧑‍🎤','🧑‍🚀','🧑‍🍳','🧑‍💻','🕵️','🧝','🧛','🤺','🧑‍🎨','🧑‍🔬','🧑‍🏫','🧑‍⚖️','🎅','🧑‍🌾','🧑‍🚒','🫅','🧑‍✈️'],
      nature:     ['🔥','🌊','⚡','🌙','⭐','🌈','☀️','💎','🌸','🍀','🌋','🫧','🌺','🌵','🍄','🪐'],
      power:      ['👑','🚀','🏆','🎯','💫','🪄','⚔️','🎭','🎸','🧲','🔮','🌀'],
    };

    let activeCategory = 'animals';
    let selectedEmoji = '🦁';

    const grid = document.getElementById('grid');
    const preview = document.getElementById('preview');
    const btnAvatar = document.getElementById('btnAvatar');
    const tabs = document.getElementById('tabs');

    function renderGrid(cat) {
      grid.innerHTML = '';
      CATEGORIES[cat].forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn' + (emoji === selectedEmoji ? ' selected' : '');
        btn.textContent = emoji;
        btn.onclick = () => selectEmoji(emoji);
        grid.appendChild(btn);
      });
    }

    function selectEmoji(emoji) {
      selectedEmoji = emoji;
      preview.textContent = emoji;
      btnAvatar.textContent = emoji;
      renderGrid(activeCategory);
    }

    tabs.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeCategory = tab.dataset.cat;
        renderGrid(activeCategory);
      };
    });

    renderGrid('animals');
  </script>
</body>
</html>
